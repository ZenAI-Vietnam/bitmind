# Video Dataset Configurations
#
# data_columns: specify column name(s) containing media bytes in parquet files
#   - Use when the column is not auto-detected (e.g., "video_bytes" instead of "video")
#   - Can specify multiple columns to extract from each row

benchmark_size: 20000

datasets:
  - name: eidon-video
    path: bitmind/bm-eidon-video
    modality: video
    media_type: real
    source_format: zip
    media_per_archive: -1
    archives_per_dataset: -1

  - name: semisynthetic-video
    path: bitmind/semisynthetic-video
    modality: video
    media_type: semisynthetic
    source_format: zip
    media_per_archive: -1
    archives_per_dataset: -1

  - name: fakeparts-faceswap
    path: hi-paris/FakeParts
    modality: video
    media_type: semisynthetic
    source_format: parquet
    media_per_archive: -1
    archives_per_dataset: -1
    include_paths: ["Faceswap/"]

  ## naming nuances noted in comments
  - name: dfd-real
    path: Hemgg/deep-fake-detection-dfd-entire-original-datasett # extra t
    modality: video
    media_type: real
    source_format: mp4
    media_per_archive: -1
    archives_per_dataset: -1
    include_paths: ["DFD_original sequences"] # space

  - name: dfd-fake
    path: Hemgg/deep-fake-detection-dfd-entire-original-datasett # extra t
    modality: video
    media_type: semisynthetic
    source_format: mp4
    media_per_archive: -1
    archives_per_dataset: -1
    include_paths: ["DFD_manipulated_sequences"]

  - name: celeb-df-v2
    path: tungdop2/playable
    modality: video
    media_type: semisynthetic
    source_format: mp4
    media_per_archive: -1
    archives_per_dataset: -1

  - name: celeb-df-v1
    path: tungdop2/playable-v1
    modality: video
    media_type: semisynthetic
    source_format: mp4
    media_per_archive: -1
    archives_per_dataset: -1

  - name: rtfs-10k-inswapper
    path: kontur-ai/rtfs-10k
    modality: video
    media_type: semisynthetic
    source_format: mp4
    media_per_archive: -1
    archives_per_dataset: -1
    include_paths: ["inswapper"]

  - name: rtfs-10k-uniface
    path: kontur-ai/rtfs-10k
    modality: video
    media_type: semisynthetic
    source_format: mp4
    media_per_archive: -1
    archives_per_dataset: -1
    include_paths: ["uniface"]

  - name: rtfs-10k-original_videos
    path: kontur-ai/rtfs-10k
    modality: video
    media_type: real
    source_format: mp4
    media_per_archive: -1
    archives_per_dataset: -1
    include_paths: ["original_videos"]